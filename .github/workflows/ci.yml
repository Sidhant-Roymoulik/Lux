name: CI

on:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ 'main' ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bench-check:
    name: bench check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Build
        run: make dev

      - name: Validate bench count in commit message
        shell: bash
        run: |
          ACTUAL=$(./src/executables/Lux.exe bench 2>/dev/null | grep "^Finished" | grep -o '[0-9]* nodes' | grep -o '[0-9]*')
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            STATED=$(git log -1 --pretty=%B HEAD^2 | grep -o 'Bench: [0-9]*' | grep -o '[0-9]*' | tail -1)
          else
            STATED=$(git log -1 --pretty=%B | grep -o 'Bench: [0-9]*' | grep -o '[0-9]*' | tail -1)
          fi
          echo "Actual bench: $ACTUAL"
          echo "Stated bench: $STATED"
          if [ -z "$STATED" ]; then
            echo "ERROR: No 'Bench: <nodes>' found in commit message"
            exit 1
          fi
          if [ "$ACTUAL" != "$STATED" ]; then
            echo "ERROR: Bench mismatch — commit says $STATED, binary produces $ACTUAL"
            exit 1
          fi
          echo "Bench OK: $ACTUAL"

  compile:
    name: compile (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Dev build
        run: make dev

      - name: Release build
        run: make release

      - name: OpenBench build
        run: make EXE=Lux-openbench

  format:
    name: format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run clang-format style check
        uses: jidicula/clang-format-action@f62da5e3d3a2d88ff364771d9d938773a618ab5e  # @v4.11.0
        continue-on-error: true
        with:
          clang-format-version: '17'
