name: Compile Check

on:
    push:
      branches: [ 'main' ]
    pull_request:
      branches: [ 'main' ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    working-directory: .

jobs:
  Lux:
    name: compile check

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Default
      run: make default

    - name: Release
      run: make release
