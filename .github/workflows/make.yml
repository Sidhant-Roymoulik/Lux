name: Compile Check

on:
    push:
      branches: [ 'main' ]
    pull_request:
      branches: [ 'main' ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    working-directory: .

jobs:
  bench-check:
    name: bench check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make dev

      - name: Validate bench count in commit message
        run: |
          ACTUAL=$(./src/executables/Lux bench 2>/dev/null | grep "^Finished" | grep -o '[0-9]* nodes' | grep -o '[0-9]*')
          STATED=$(git log -1 --pretty=%B | grep -oP '(?<=Bench: )\d+')
          echo "Actual bench: $ACTUAL"
          echo "Stated bench: $STATED"
          if [ -z "$STATED" ]; then
            echo "ERROR: No 'Bench: <nodes>' found in commit message"
            exit 1
          fi
          if [ "$ACTUAL" != "$STATED" ]; then
            echo "ERROR: Bench mismatch — commit says $STATED, binary produces $ACTUAL"
            exit 1
          fi
          echo "Bench OK: $ACTUAL"

  Lux:
    name: compile check

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Default
      run: make dev

    - name: Release
      run: make release

    - name: Build (OpenBench)
      run: make EXE=Lux-openbench
